<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessie & Jim 集點系統 V3.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --jessie-color: #ffafcc; --jim-color: #a2d2ff; --bg-color: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1000px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; width: 330px; text-align: center; }
        .jessie { border-top: 8px solid var(--jessie-color); }
        .jim { border-top: 8px solid var(--jim-color); }
        .score { font-size: 56px; font-weight: bold; margin: 5px 0; color: #333; }
        .controls { display: flex; flex-direction: column; gap: 10px; text-align: left; }
        label { font-size: 14px; color: #666; font-weight: bold; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        .plus { background-color: #57cc99; color: white; }
        .minus { background-color: #ff4d6d; color: white; }
        .export-btn { background-color: #4361ee; color: white; padding: 12px 30px; border-radius: 30px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3); }
        .history { margin-top: 15px; text-align: left; font-size: 0.85em; height: 180px; overflow-y: auto; border-top: 2px solid #f1f1f1; padding-top: 10px; }
        .history-item { margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .pos { color: #2d6a4f; font-weight: bold; }
        .neg { color: #a4133c; font-weight: bold; }
        .clear-btn { background-color: #f1f3f5; color: #adb5bd; margin-top: 15px; width: 100%; font-size: 12px; }
        .clear-btn:hover { background-color: #e9ecef; color: #fa5252; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loading-screen" class="loading">正在讀取雲端點數...</div>

    <h1>🏆 Jessie & Jim 集點系統</h1>
    <button class="export-btn" onclick="exportToFile()">💾 下載完整紀錄 (.txt)</button>

    <div class="container">
        <div id="ui-jessie"></div>
        <div id="ui-jim"></div>
    </div>

    <script>
        // --- For Firebase JS SDK v7.20.0 and later, measurementId is optional ---
        const firebaseConfig = {
             apiKey: "AIzaSyDVbw1RrYDmiXGT-ptMI4a3ZBlGbaGtkCw",
             authDomain: "kids-points-system-4da41.firebaseapp.com",
             databaseURL: "https://kids-points-system-4da41-default-rtdb.firebaseio.com/",
             projectId: "kids-points-system-4da41",
             storageBucket: "kids-points-system-4da41.firebasestorage.app",
             messagingSenderId: "464697539780",
             appId: "1:464697539780:web:9f92d22a045ad1f6c61d91",
             measurementId: "G-00KDTMDKQJ"
        };
        // ---------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let data = { jessie: { score: 0, history: [] }, jim: { score: 0, history: [] } };

        function createCard(kid, displayName) {
            const html = `
                <div class="card ${kid}">
                    <h2>${displayName}</h2>
                    <div id="score-${kid}" class="score">0</div>
                    <div class="controls">
                        <label>1. 輸入點數</label>
                        <input type="number" id="num-${kid}" value="1" step="1">
                        
                        <label>2. 選擇原因 (或手動輸入)</label>
                        <select id="select-${kid}" onchange="syncNote('${kid}')">
                            <option value="">-- 請選擇或在下方輸入 --</option>
                            <option value="完成評量/考卷">完成評量/考卷</option>
                            <option value="已兌換獎勵">已兌換獎勵</option>
                            <option value="custom">自定義輸入...</option>
                        </select>
                        <input type="text" id="note-${kid}" placeholder="輸入具體表現...">
                        
                        <div class="btn-group">
                            <button class="plus" onclick="handleUpdate('${kid}', 'plus')">確認加分</button>
                            <button class="minus" onclick="handleUpdate('${kid}', 'minus')">確認扣分</button>
                        </div>
                    </div>
                    <div class="history" id="history-${kid}">最近紀錄載入中...</div>
                    <button class="clear-btn" onclick="clearData('${kid}')">⚠ 清除資料並歸零</button>
                </div>
            `;
            document.getElementById(`ui-${kid}`).innerHTML = html;
        }

        createCard('jessie', 'Jessie');
        createCard('jim', 'Jim');

        function syncNote(kid) {
            const select = document.getElementById(`select-${kid}`);
            const noteInput = document.getElementById(`note-${kid}`);
            if (select.value && select.value !== "custom") {
                noteInput.value = select.value;
            } else {
                noteInput.value = "";
            }
        }

        function handleUpdate(kid, type) {
            const numInput = document.getElementById(`num-${kid}`);
            const noteInput = document.getElementById(`note-${kid}`);
            let val = parseInt(numInput.value) || 0;
            
            if (type === 'minus' && val > 0) val = -val;
            if (type === 'plus' && val < 0) val = Math.abs(val);

            const note = noteInput.value.trim() || "表現優良/待改進";
            const now = new Date();
            const timestamp = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

            data[kid].score += val;
            if (!data[kid].history) data[kid].history = [];
            data[kid].history.unshift({ time: timestamp, change: val > 0 ? `+${val}` : val, note: note, currentScore: data[kid].score });

            db.ref('kidsData').set(data);
            noteInput.value = "";
            document.getElementById(`select-${kid}`).value = "";
            numInput.value = "1"; // 重置為預設加 1 分
        }

        function clearData(kid) {
            if (confirm(`確定要清除 ${kid} 的所有點數與歷史紀錄嗎？建議清除前先下載備份。`)) {
                data[kid] = { score: 0, history: [] };
                db.ref('kidsData').set(data);
            }
        }

        db.ref('kidsData').on('value', (snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) data = cloudData;
            document.getElementById('loading-screen').style.display = 'none';
            render();
        });

        function render() {
            ['jessie', 'jim'].forEach(kid => {
                document.getElementById(`score-${kid}`).innerText = data[kid].score;
                const historyDiv = document.getElementById(`history-${kid}`);
                historyDiv.innerHTML = "<strong>最近紀錄：</strong>";
                const logs = data[kid].history || [];
                logs.slice(0, 10).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    const colorClass = item.change.toString().includes('+') ? 'pos' : 'neg';
                    div.innerHTML = `<small>${item.time}</small> <span class="${colorClass}">${item.change}</span>: ${item.note}`;
                    historyDiv.appendChild(div);
                });
            });
        }

        function exportToFile() {
            let content = "=== Jessie & Jim 集點紀錄 ===\n";
            content += `導出時間: ${new Date().toLocaleString()}\n`;
            ['jessie', 'jim'].forEach(kid => {
                content += `\n【${kid.toUpperCase()}】 目前總分: ${data[kid].score}\n`;
                content += "-------------------------------------------\n";
                const logs = data[kid].history || [];
                if (logs.length === 0) content += "尚無紀錄\n";
                logs.forEach(h => {
                    content += `${h.time} | 變動: ${h.change} | 原因: ${h.note} (餘額: ${h.currentScore})\n`;
                });
            });
            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `集點紀錄_${new Date().toISOString().slice(0,10)}.txt`;
            link.click();
        }
    </script>
</body>
</html>
